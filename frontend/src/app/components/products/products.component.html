<div class="animate-slide-up">
  <h1 class="title-gradient mb-4">Em Estoque</h1>
  
  <div class="glass-panel p-6 mb-6">
    <h2 class="text-lg font-semibold mb-4">Cadastrar Novo Produto</h2>
    
    <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group" style="width: 150px; flex-shrink: 0;">
          <label>Código</label>
          <input type="text" formControlName="code" class="form-control" placeholder="Ex: PRD-001">
        </div>
        <div class="form-group" style="width: 100px; flex-shrink: 0;">
          <label>Saldo Inicial</label>
          <input type="number" formControlName="balance" class="form-control">
        </div>
        <div class="form-group align-end">
          <button type="button" class="btn magic-btn" (click)="generateMagic()" [disabled]="isGeneratingMagic">
            <div *ngIf="isGeneratingMagic" class="spinner"></div>
            {{ isGeneratingMagic ? 'Gerando...' : '✨ IA' }}
          </button>
        </div>
        <div class="form-group align-end">
          <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid || isSubmitting">
            <div *ngIf="isSubmitting" class="spinner"></div>
            {{ isSubmitting ? 'Salvando...' : 'Cadastrar' }}
          </button>
        </div>
      </div>
      <div class="form-group" style="margin-top: 0.75rem;">
        <label>Descrição Corporativa</label>
        <input type="text" formControlName="description" class="form-control" placeholder="Descreva o produto ou use o botão IA acima...">
      </div>
    </form>
  </div>

  <div class="glass-panel overflow-hidden">
    <table class="data-table">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Saldo Atual</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of products">
          <td class="font-medium text-primary">{{ p.code }}</td>
          <td>{{ p.description }}</td>
          <td>
            <span class="badge" [class.badge-closed]="p.balance === 0" [class.badge-open]="p.balance > 0">
               {{ p.balance }} und
            </span>
          </td>
        </tr>
        <tr *ngIf="products.length === 0">
          <td colspan="3" class="text-center py-4 text-secondary">Nenhum produto cadastrado ainda.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div *ngIf="toastMsg" class="toast" [class.error]="isErrorToast" [class.success]="!isErrorToast">
  {{ toastMsg }}
</div>
