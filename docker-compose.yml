version: '3.8'

services:
  db:
    image: postgres:15
    container_name: korp_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - korp_network

  # Depois adicionamos os microsserviços via Dockerfile se necessrio para o ambiente final.
  
volumes:
  pgdata:

networks:
  korp_network:
    driver: bridge
